<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>邮箱查看窗口</title>
    <style>
      :root {
        --bg:
          radial-gradient(circle at 14% 16%, rgba(101, 145, 255, 0.22), transparent 32%),
          radial-gradient(circle at 84% 14%, rgba(53, 198, 154, 0.16), transparent 28%),
          linear-gradient(180deg, #f7f4ef 0%, #eef3f8 46%, #edf0f4 100%);
        --card: rgba(255, 253, 249, 0.84);
        --card-soft: rgba(255, 255, 255, 0.54);
        --line: rgba(135, 154, 182, 0.28);
        --text: #162033;
        --muted: #6c7890;
        --primary: #12284f;
        --primary-ink: #f8fbff;
        --error: #a43b2b;
        --shadow: 0 24px 62px rgba(18, 30, 50, 0.10);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .page {
        max-width: 1300px;
        margin: 0 auto;
        padding: 20px;
      }
      .topbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .title {
        margin: 0;
        font-size: 20px;
      }
      .muted { color: var(--muted); font-size: 13px; }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      select, button {
        height: 40px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.64);
        color: var(--text);
        padding: 0 14px;
      }
      button {
        cursor: pointer;
        background: var(--primary);
        color: var(--primary-ink);
        border-color: var(--primary);
        box-shadow: 0 14px 32px rgba(21, 38, 74, 0.14);
      }
      button.secondary {
        background: rgba(255,255,255,0.7);
        color: var(--text);
        border-color: var(--line);
        box-shadow: none;
      }
      .status {
        min-height: 20px;
        margin: 8px 0 12px;
        font-size: 13px;
      }
      .status.error { color: var(--error); }
      .layout {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 12px;
        min-height: calc(100vh - 170px);
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }
      .panel-head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        font-weight: 600;
      }
      .mail-list {
        overflow: auto;
        height: 100%;
      }
      .item {
        width: 100%;
        text-align: left;
        background: transparent;
        color: inherit;
        border: 0;
        border-bottom: 1px solid rgba(135, 154, 182, 0.18);
        border-radius: 0;
        padding: 12px 14px;
      }
      .item:hover { background: rgba(255,255,255,0.58); }
      .item.active { background: rgba(235, 244, 255, 0.82); }
      .item-subject {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .item-meta {
        font-size: 12px;
        color: var(--muted);
      }
      .item-summary {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
      }
      .detail {
        padding: 16px;
        overflow: auto;
      }
      .detail h3 {
        margin: 0 0 8px;
      }
      .detail-meta {
        font-size: 13px;
        color: var(--muted);
        margin: 3px 0;
      }
      .detail-summary {
        margin-top: 8px;
        font-size: 13px;
        color: var(--text);
        line-height: 1.45;
        white-space: pre-wrap;
        background: var(--card-soft);
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 16px;
      }
      .detail-body {
        margin-top: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.5;
      }
      .empty {
        padding: 24px;
        color: var(--muted);
      }
      @media (max-width: 980px) {
        .layout { grid-template-columns: 1fr; min-height: auto; }
        .mail-list { max-height: 48vh; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <div>
          <h1 class="title">邮箱查看窗口</h1>
          <div class="muted">独立查看邮件列表和邮件详情，用于先确认邮箱数据链路可用。</div>
        </div>
        <div class="controls">
          <a class="muted" href="/" style="text-decoration:none;">返回主页面</a>
          <label class="muted" for="sourceSelect">数据源</label>
          <select id="sourceSelect"></select>
          <button id="refreshBtn" type="button">刷新邮件</button>
        </div>
      </div>

      <div id="status" class="status"></div>

      <div class="layout">
        <section class="panel">
          <div class="panel-head">邮件列表</div>
          <div id="mailList" class="mail-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">邮件详情</div>
          <div id="mailDetail" class="detail">
            <div class="empty">请选择左侧一封邮件查看详情。</div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const sourceSelectEl = document.getElementById("sourceSelect");
      const refreshBtnEl = document.getElementById("refreshBtn");
      const mailListEl = document.getElementById("mailList");
      const mailDetailEl = document.getElementById("mailDetail");

      const state = {
        sourceId: "default_outlook",
        sources: [],
        items: [],
        selectedMessageId: null,
        inboxRequestSeq: 0,
        detailRequestSeq: 0,
        inboxLoading: false,
      };

      function setStatus(message, isError = false) {
        statusEl.textContent = message || "";
        statusEl.className = isError ? "status error" : "status";
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, {
          credentials: "include",
          headers: { "Content-Type": "application/json", ...(options?.headers || {}) },
          ...options,
        });

        const text = await response.text();
        const body = text ? safeJson(text) : null;
        if (!response.ok) {
          const message = body && typeof body === "object" && body.error ? String(body.error) : `HTTP ${response.status}`;
          const error = new Error(message);
          error.status = response.status;
          error.payload = body;
          throw error;
        }

        return body;
      }

      function safeJson(text) {
        try {
          return JSON.parse(text);
        } catch {
          return { raw: text };
        }
      }

      function formatTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString();
      }

      function sanitizeHttpUrl(rawUrl) {
        try {
          const parsed = new URL(String(rawUrl || ""));
          if (parsed.protocol === "http:" || parsed.protocol === "https:") {
            return parsed;
          }
        } catch {
          return null;
        }
        return null;
      }

      function isAllowedOutlookWebHost(hostname) {
        const host = String(hostname || "").toLowerCase();
        const exact = new Set([
          "outlook.office.com",
          "outlook.live.com",
          "outlook.office365.com",
          "outlook.office.de",
          "outlook.office.cn",
          "outlook.office.us",
        ]);
        if (exact.has(host)) {
          return true;
        }

        return (
          host.endsWith(".outlook.office.com") ||
          host.endsWith(".outlook.live.com") ||
          host.endsWith(".outlook.office365.com") ||
          host.endsWith(".outlook.office.de") ||
          host.endsWith(".outlook.office.cn") ||
          host.endsWith(".outlook.office.us")
        );
      }

      function sanitizeExternalLink(rawUrl) {
        const parsed = sanitizeHttpUrl(rawUrl);
        if (!parsed) {
          return null;
        }
        if (parsed.protocol !== "https:") {
          return null;
        }
        if (!isAllowedOutlookWebHost(parsed.hostname)) {
          return null;
        }
        return parsed.toString();
      }

      function plainTextFromBody(detail) {
        const raw = detail?.bodyContent || detail?.bodyPreview || "";
        if ((detail?.bodyContentType || "").toLowerCase() !== "html") {
          return raw;
        }
        const doc = new DOMParser().parseFromString(raw, "text/html");
        return (doc.body?.textContent || "").trim();
      }

      function renderSources() {
        sourceSelectEl.innerHTML = "";
        for (const source of state.sources) {
          const option = document.createElement("option");
          option.value = source.id;
          option.textContent = `${source.name}${source.emailHint ? ` (${source.emailHint})` : ""}${source.ready ? "" : " [未就绪]"}`;
          option.disabled = !source.enabled || !source.ready;
          if (source.id === state.sourceId) {
            option.selected = true;
          }
          sourceSelectEl.appendChild(option);
        }
      }

      function renderList() {
        mailListEl.innerHTML = "";
        if (!state.items.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "当前数据源没有读取到邮件。";
          mailListEl.appendChild(empty);
          return;
        }

        for (const item of state.items) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `item${state.selectedMessageId === item.id ? " active" : ""}`;
          button.addEventListener("click", () => void loadMessageDetail(item.id));

          const subject = document.createElement("div");
          subject.className = "item-subject";
          subject.textContent = item.subject || "(No Subject)";

          const meta = document.createElement("div");
          meta.className = "item-meta";
          meta.textContent = `${item.fromName || item.fromAddress || "Unknown"} · ${formatTime(item.receivedDateTime)}`;

          const summary = document.createElement("div");
          summary.className = "item-summary";
          summary.textContent = item.aiSummary || "摘要生成中...";

          button.appendChild(subject);
          button.appendChild(meta);
          button.appendChild(summary);
          mailListEl.appendChild(button);
        }
      }

      function renderDetailLoading() {
        mailDetailEl.innerHTML = `<div class="empty">邮件详情加载中...</div>`;
      }

      function renderDetail(detail) {
        mailDetailEl.innerHTML = "";
        const subject = document.createElement("h3");
        subject.textContent = detail.subject || "(No Subject)";

        const from = document.createElement("div");
        from.className = "detail-meta";
        from.textContent = `发件人: ${detail.fromName || detail.fromAddress || "Unknown"}`;

        const received = document.createElement("div");
        received.className = "detail-meta";
        received.textContent = `时间: ${formatTime(detail.receivedDateTime)}`;

        const summary = document.createElement("div");
        summary.className = "detail-summary";
        summary.textContent = `AI摘要：${detail.aiSummary || "摘要生成中..."}`;

        const actions = document.createElement("div");
        actions.style.marginTop = "10px";
        const safeWebLink = sanitizeExternalLink(detail.webLink);
        if (safeWebLink) {
          const openBtn = document.createElement("button");
          openBtn.type = "button";
          openBtn.className = "secondary";
          openBtn.textContent = "在 Outlook 打开";
          openBtn.addEventListener("click", () => window.open(safeWebLink, "_blank", "noopener,noreferrer"));
          actions.appendChild(openBtn);
        }

        const body = document.createElement("div");
        body.className = "detail-body";
        body.textContent = plainTextFromBody(detail) || "(空内容)";

        mailDetailEl.appendChild(subject);
        mailDetailEl.appendChild(from);
        mailDetailEl.appendChild(received);
        mailDetailEl.appendChild(summary);
        mailDetailEl.appendChild(actions);
        mailDetailEl.appendChild(body);
      }

      async function loadSources() {
        const response = await fetchJson("/api/mail/sources");
        const result = response?.result;
        const sources = Array.isArray(result?.sources) ? result.sources : [];
        if (!sources.length) {
          throw new Error("未读取到任何数据源");
        }
        const readySources = sources.filter((item) => item.enabled && item.ready);
        const activeReady = readySources.find((item) => item.id === result?.activeSourceId);
        const fallbackReady =
          readySources.find((item) => item.id === "default_outlook") ||
          readySources[0] ||
          null;
        const selected = activeReady || fallbackReady;

        state.sources = sources;
        state.sourceId = selected?.id || result?.activeSourceId || sources[0].id;
        renderSources();

        return {
          hasReadySource: Boolean(selected),
        };
      }

      async function loadInbox() {
        const inboxRequestSeq = ++state.inboxRequestSeq;
        const requestSourceId = state.sourceId;
        const selectedSource = state.sources.find((item) => item.id === requestSourceId);
        if (!selectedSource || !selectedSource.enabled || !selectedSource.ready) {
          state.items = [];
          state.selectedMessageId = null;
          renderList();
          mailDetailEl.innerHTML = `<div class="empty">当前数据源未通过验证，请先完成 verify。</div>`;
          setStatus("当前没有可用数据源，请先在主界面完成邮箱授权与数据源验证。", true);
          return;
        }

        state.inboxLoading = true;
        sourceSelectEl.disabled = true;
        refreshBtnEl.disabled = true;
        setStatus("正在加载邮件列表...");

        try {
          const url = `/api/mail/inbox/view?limit=35&sourceId=${encodeURIComponent(requestSourceId)}`;
          const response = await fetchJson(url);
          if (inboxRequestSeq !== state.inboxRequestSeq || requestSourceId !== state.sourceId) {
            return;
          }

          const result = response?.result;
          state.items = Array.isArray(result?.items) ? result.items : [];
          state.selectedMessageId = state.items[0]?.id || null;
          renderList();
          if (state.selectedMessageId) {
            await loadMessageDetail(state.selectedMessageId);
          } else {
            mailDetailEl.innerHTML = `<div class="empty">当前数据源没有读取到邮件。</div>`;
          }

          if (inboxRequestSeq !== state.inboxRequestSeq || requestSourceId !== state.sourceId) {
            return;
          }
          setStatus(`邮件列表已更新：${state.items.length} 封`);
        } catch (error) {
          if (inboxRequestSeq !== state.inboxRequestSeq || requestSourceId !== state.sourceId) {
            return;
          }
          const status = Number(error?.status || 0);
          if (status === 401) {
            setStatus("未登录。请先回主页面登录，再刷新此窗口。", true);
          } else if (status === 412) {
            state.items = [];
            state.selectedMessageId = null;
            renderList();
            mailDetailEl.innerHTML = `<div class="empty">当前数据源未通过校验，已清空旧内容。</div>`;
            setStatus("当前数据源未就绪，正在尝试切换到可用数据源...", true);
            try {
              const snapshot = await loadSources();
              if (snapshot?.hasReadySource) {
                await loadInbox();
                return;
              }
              setStatus("当前没有已就绪数据源，请先在主界面完成 verify。", true);
            } catch {
              // Ignore source refresh failures here.
            }
          } else {
            setStatus(error?.message || String(error), true);
          }
        } finally {
          if (inboxRequestSeq === state.inboxRequestSeq) {
            state.inboxLoading = false;
            sourceSelectEl.disabled = false;
            refreshBtnEl.disabled = false;
          }
        }
      }

      async function loadMessageDetail(messageId) {
        const detailRequestSeq = ++state.detailRequestSeq;
        const requestSourceId = state.sourceId;
        state.selectedMessageId = messageId;
        renderList();
        renderDetailLoading();
        try {
          const url = `/api/mail/message?messageId=${encodeURIComponent(messageId)}&sourceId=${encodeURIComponent(requestSourceId)}`;
          const response = await fetchJson(url);
          if (
            detailRequestSeq !== state.detailRequestSeq ||
            requestSourceId !== state.sourceId ||
            state.selectedMessageId !== messageId
          ) {
            return;
          }
          renderDetail(response?.result || {});
        } catch (error) {
          if (
            detailRequestSeq !== state.detailRequestSeq ||
            requestSourceId !== state.sourceId ||
            state.selectedMessageId !== messageId
          ) {
            return;
          }
          renderDetail({ subject: "加载失败", bodyContentType: "text", bodyContent: String(error?.message || error) });
        }
      }

      sourceSelectEl.addEventListener("change", () => {
        state.sourceId = sourceSelectEl.value;
        void loadInbox();
      });

      refreshBtnEl.addEventListener("click", () => {
        void (async () => {
          try {
            await loadSources();
          } catch {
            // Ignore source refresh failure and still attempt inbox refresh.
          }
          await loadInbox();
        })();
      });

      (async () => {
        try {
          const sourceSnapshot = await loadSources();
          if (!sourceSnapshot?.hasReadySource) {
            setStatus("当前没有已就绪数据源，请先在主页面完成授权并验证。", true);
            renderList();
            mailDetailEl.innerHTML = `<div class="empty">请先在主页面完成数据源 verify。</div>`;
            return;
          }
          await loadInbox();
        } catch (error) {
          const status = Number(error?.status || 0);
          if (status === 401) {
            setStatus("未登录。请先回主页面登录，再刷新此窗口。", true);
          } else {
            setStatus(error?.message || String(error), true);
          }
        }
      })();
    </script>
  </body>
</html>
