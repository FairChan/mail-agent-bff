services:
  bff:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.bff
    container_name: mail-agent-bff
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BFF_PORT:-8787}:8787"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      TRUST_PROXY: "1"
      AGENT_RUNTIME: mastra
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL, for example https://mail.example.com}
      DATABASE_URL: postgresql://mery:${DB_PASSWORD:?set DB_PASSWORD}@postgres:5432/mery
      BFF_API_KEY: ${BFF_API_KEY:?set BFF_API_KEY}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?set APP_ENCRYPTION_KEY}
      LLM_PROVIDER_BASE_URL: ${LLM_PROVIDER_BASE_URL:?set LLM_PROVIDER_BASE_URL}
      LLM_PROVIDER_API_KEY: ${LLM_PROVIDER_API_KEY:?set LLM_PROVIDER_API_KEY}
      LLM_PROVIDER_MODEL: ${LLM_PROVIDER_MODEL:?set LLM_PROVIDER_MODEL}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:?set MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_SCOPES: ${MICROSOFT_SCOPES:-openid profile email offline_access User.Read Mail.Read Calendars.ReadWrite}
      REDIS_AUTH_SESSIONS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-mail_agent:bff}
      CORS_ORIGINS: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}
      PRISMA_AUTH_ENABLED: "true"
      ENABLE_EMAIL_PERSISTENCE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mail-agent-network

  webui:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.webui
      args:
        VITE_BFF_BASE_URL: /api
    container_name: mail-agent-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-8080}:80"
    depends_on:
      bff:
        condition: service_healthy
    networks:
      - mail-agent-network

  postgres:
    image: postgres:15-alpine
    container_name: mail-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mery
      POSTGRES_USER: mery
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mery -d mery"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail-agent-network

  redis:
    image: redis:7-alpine
    container_name: mail-agent-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail-agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  mail-agent-network:
    driver: bridge
