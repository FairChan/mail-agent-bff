version: "3.8"

services:
  # BFF 服务
  bff:
    build:
      context: ../..
      dockerfile: apps/bff/Dockerfile
    container_name: mery-bff
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mery:${DB_PASSWORD:-mery_password}@postgres:5432/mery
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENCLAW_GATEWAY_BASE_URL=http://gateway:18789
      - SESSION_SECRET=${SESSION_SECRET:-default-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mery-network

  # WebUI
  webui:
    build:
      context: ../..
      dockerfile: apps/webui/Dockerfile
    container_name: mery-webui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - bff
    networks:
      - mery-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: mery-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mery
      - POSTGRES_USER=mery
      - POSTGRES_PASSWORD=${DB_PASSWORD:-mery_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mery -d mery"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mery-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mery-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mery-network

  # OpenClaw Gateway
  gateway:
    image: ghcr.io/openclaw/gateway:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - PORT=18789
    networks:
      - mery-network

volumes:
  postgres_data:
  redis_data:

networks:
  mery-network:
    driver: bridge
