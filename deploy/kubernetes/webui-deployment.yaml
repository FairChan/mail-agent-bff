apiVersion: apps/v1
kind: Deployment
metadata:
  name: mery-webui
  namespace: mery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mery-webui
  template:
    metadata:
      labels:
        app: mery-webui
    spec:
      containers:
        - name: webui
          image: ghcr.io/true-sight/mery-webui:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webui-svc
  namespace: mery
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: mery-webui
