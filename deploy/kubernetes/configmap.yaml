apiVersion: v1
kind: ConfigMap
metadata:
  name: mery-config
  namespace: mery
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: mery-secrets
  namespace: mery
type: Opaque
stringData:
  DATABASE_URL: "postgresql://mery@postgres-svc:5432/mery?sslmode=require"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  SESSION_SECRET: "${SESSION_SECRET}"
  OPENCLAW_GATEWAY_BASE_URL: "http://gateway-svc:18789"
