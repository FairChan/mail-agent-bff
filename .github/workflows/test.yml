name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://mery:mery_password@127.0.0.1:5432/mery
      BFF_API_KEY: ci-placeholder-key-000000
      APP_ENCRYPTION_KEY: ci-placeholder-encryption-key-32chars
      LLM_PROVIDER_BASE_URL: https://example.invalid/v1
      LLM_PROVIDER_API_KEY: ci-placeholder-provider-key
      LLM_PROVIDER_MODEL: ci-placeholder-model
      MICROSOFT_CLIENT_ID: ci-placeholder-client-id
      MICROSOFT_REDIRECT_URI: http://127.0.0.1:8787/api/mail/connections/outlook/direct/callback
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate --schema apps/bff/prisma/schema.prisma

      - name: TypeScript check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=moderate
