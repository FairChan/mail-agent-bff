name: Load Tests

on:
  schedule:
    - cron: "0 4 * * *"  # 每天凌晨 4 点
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL"
        required: false
        default: "https://staging.true-sight.asia"

jobs:
  load-test:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      
      - name: Run Load Tests
        run: |
          k6 run \
            --env BASE_URL="${{ inputs.target_url || 'https://staging.true-sight.asia' }}" \
            --env AUTH_EMAIL="${{ secrets.LOAD_TEST_EMAIL }}" \
            --env AUTH_PASSWORD="${{ secrets.LOAD_TEST_PASSWORD }}" \
            --out json=results.json \
            load-tests/bff-load.test.ts || true
      
      - name: Upload Results
        uses: actions/upload-artifact@v7
        with:
          name: k6-results
          path: results.json
          retention-days: 30
      
      - name: Publish Results Summary
        if: always()
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f results.json ]; then
            echo "✅ Test completed. See artifacts for detailed results." >> $GITHUB_STEP_SUMMARY
          fi
