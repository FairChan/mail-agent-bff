name: Dependency Review
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # 每周一早上 6 点

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          # 允许的许可证列表
          allowed-licenses: MIT, ISC, Apache-2.0, BSD-2-Clause, BSD-3-Clause, CC0-1.0
          # 禁止的许可证
          denied-licenses: GPL-1.0-or-later, GPL-2.0-or-later, AGPL-1.0-or-later, AGPL-3.0-or-later

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Audit BFF dependencies
        run: |
          cd apps/bff
          npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Audit WebUI dependencies
        run: |
          cd apps/webui
          npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: "**/audit-report.json"
          retention-days: 30

  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check outdated BFF deps
        run: |
          cd apps/bff
          echo "=== BFF Outdated Dependencies ==="
          npm outdated || echo "All dependencies are up to date"
      
      - name: Check outdated WebUI deps
        run: |
          cd apps/webui
          echo "=== WebUI Outdated Dependencies ==="
          npm outdated || echo "All dependencies are up to date"
